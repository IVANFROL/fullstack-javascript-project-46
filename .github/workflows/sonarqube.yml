name: SonarQube analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read # allows SonarQube to decorate PRs with analysis results

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Analyze with SonarQube
        uses: SonarSource/sonarqube-scan-action@7295e71c9583053f5bf40e9d4068a0c974603ec8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # Your SonarQube token
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Usually https://sonarcloud.io
        with:
          args:
            -Dsonar.projectKey=IVANFROL_fullstack-javascript-project-46
            # -Dsonar.organization=ivanfrol # (если требуется для SonarCloud, раскомментируйте и укажите свой организационный ключ)
            # -Dsonar.sources=. # (по умолчанию текущая директория)
